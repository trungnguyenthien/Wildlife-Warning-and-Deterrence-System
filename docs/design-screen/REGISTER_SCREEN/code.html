            </div>

            <!-- Form -->
            <form class="flex flex-col gap-stack-md mt-4">
                
                <!-- Username Input -->
                <div class="flex flex-col gap-stack-sm">
                    <label for="username" class="font-label-md text-label-md text-on-surface">Tên đăng nhập</label>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined absolute left-3 text-on-surface-variant" data-icon="person">person</span>

                    </div>
                </div>

                <!-- Email Input -->
                <div class="flex flex-col gap-stack-sm">
                    <label for="email" class="font-label-md text-label-md text-on-surface">Email</label>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined absolute left-3 text-on-surface-variant" data-icon="mail">mail</span>
                        <input type="email" id="email" placeholder="Nhập email" class="w-full h-12 pl-10 pr-4 bg-surface-container-lowest border border-outline rounded-lg font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    </div>
                </div>

                <!-- Password Input -->
                <div class="flex flex-col gap-stack-sm">
                    <label for="password" class="font-label-md text-label-md text-on-surface">Mật khẩu</label>
                    <div class="relative flex items-center">
                        <span class="material-symbols-outlined absolute left-3 text-on-surface-variant" data-icon="lock">lock</span>
                        <input type="password" id="password" placeholder="Nhập mật khẩu" class="w-full h-12 pl-10 pr-12 bg-surface-container-lowest border border-outline rounded-lg font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                        <button type="button" class="absolute right-3 p-1 rounded-full text-on-surface-variant hover:bg-surface-variant transition-colors" aria-label="Toggle password visibility">
                            <span class="material-symbols-outlined" data-icon="visibility">visibility</span>
                        </button>
                    </div>
                    
                    <!-- Password Strength Indicator -->
                    <div class="flex items-center gap-2 mt-1">
                        <div class="h-1 flex-1 rounded-full bg-error"></div>
                        <div class="h-1 flex-1 rounded-full bg-surface-variant"></div>
                        <div class="h-1 flex-1 rounded-full bg-surface-variant"></div>
                        <span class="font-label-sm text-label-sm text-error w-16 text-right">Yếu</span>
                    </div>
                </div>

                <!-- Confirm Password Input -->
                <div class="flex flex-col gap-stack-sm">
                    <label for="password_confirm" class="font-label-md text-label-md text-on-surface">Xác nhận mật khẩu</label>

                        <span class="material-symbols-outlined absolute left-3 text-on-surface-variant" data-icon="lock_reset">lock_reset</span>

                        <button type="button" class="absolute right-3 p-1 rounded-full text-on-surface-variant hover:bg-surface-variant transition-colors" aria-label="Toggle password visibility">

                <button type="button" class="w-full h-12 bg-primary text-on-primary rounded-lg font-label-lg text-label-lg flex items-center justify-center hover:bg-surface-tint active:scale-[0.98] transition-all shadow-sm">

                <!-- Login Link -->
                </div></div></main>
