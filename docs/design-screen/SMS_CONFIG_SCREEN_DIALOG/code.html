<!DOCTYPE html><html lang="vi"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Quản lý SĐT</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-on-surface": "#f0f1f2",
                      "on-secondary-fixed": "#2e150b",
                      "on-secondary": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "surface-container-highest": "#e1e3e4",
                      "on-secondary-fixed-variant": "#603f33",
                      "tertiary-fixed-dim": "#ffb786",
                      "on-tertiary-fixed": "#311300",
                      "primary": "#0d631b",
                      "on-error-container": "#93000a",
                      "surface-tint": "#1b6d24",
                      "surface": "#f8f9fa",
                      "outline-variant": "#bfcaba",
                      "surface-container": "#edeeef",
                      "tertiary": "#884200",
                      "inverse-primary": "#88d982",
                      "background": "#f8f9fa",
                      "on-primary": "#ffffff",
                      "primary-fixed-dim": "#88d982",
                      "outline": "#707a6c",
                      "tertiary-fixed": "#ffdcc6",
                      "surface-dim": "#d9dadb",
                      "surface-container-low": "#f3f4f5",
                      "on-secondary-container": "#795548",
                      "on-background": "#191c1d",
                      "on-surface-variant": "#40493d",
                      "on-tertiary-fixed-variant": "#723600",
                      "surface-bright": "#f8f9fa",
                      "on-surface": "#191c1d",
                      "tertiary-container": "#ad5600",
                      "secondary-fixed": "#ffdbcf",
                      "on-primary-container": "#cbffc2",
                      "secondary-container": "#fdcdbc",
                      "on-tertiary": "#ffffff",
                      "surface-variant": "#e1e3e4",
                      "inverse-surface": "#2e3132",
                      "secondary-fixed-dim": "#ebbcac",
                      "primary-fixed": "#a3f69c",
                      "on-primary-fixed-variant": "#005312",
                      "primary-container": "#2e7d32",
                      "surface-container-high": "#e7e8e9",
                      "error": "#ba1a1a",
                      "on-primary-fixed": "#002204",
                      "secondary": "#7a5649",
                      "on-tertiary-container": "#ffeee6",
                      "error-container": "#ffdad6",
                      "on-error": "#ffffff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-lg": "24px",
                      "stack-md": "16px",
                      "base": "8px",
                      "stack-sm": "4px",
                      "container-padding": "16px",
                      "gutter": "12px"
              },
              "fontFamily": {
                      "headline-sm": ["Inter"],
                      "body-lg": ["Inter"],
                      "label-lg": ["Inter"],
                      "label-sm": ["Inter"],
                      "body-md": ["Inter"],
                      "headline-md": ["Inter"],
                      "headline-lg": ["Inter"],
                      "label-md": ["Inter"]
              },
              "fontSize": {
                      "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}],
                      "label-sm": ["11px", {"lineHeight": "16px", "fontWeight": "500"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}]
              }
            },
          }
        }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col font-sans antialiased text-on-background">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface dark:bg-surface-dim shadow-sm z-50">
<div class="flex items-center h-16 px-container-padding w-full gap-4">
<button aria-label="Quay lại" class="p-2 rounded-full hover:bg-surface-container-high transition-colors active:scale-95 text-on-surface-variant flex-shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary dark:text-primary-fixed truncate">Quan ly SDT - Them moi (Dialog)</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-container-padding py-stack-md flex flex-col gap-stack-lg max-w-2xl mx-auto w-full">
<!-- Context / Subtitle -->
<section aria-label="Thông tin số điện thoại" class="bg-surface-container-low p-4 rounded-xl border border-outline-variant shadow-sm">
<div class="flex gap-3">
<span class="material-symbols-outlined text-primary mt-0.5 flex-shrink-0" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Tối đa 3 SĐT. SĐT của bạn đã nhận mặc định — danh sách này là các SĐT bổ sung.
                </p>
</div>
</section>
<!-- Phone Number List (Bento-style Cards) -->
<section aria-label="Danh sách số điện thoại nhận cảnh báo" class="flex flex-col gap-stack-sm">
<!-- Default User Phone (Immutable) -->
<!-- Item 1 -->
<div class="flex items-center justify-between p-4 bg-surface rounded-xl border border-outline-variant shadow-sm group hover:shadow-md transition-shadow">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">phone_iphone</span>
</div>
<div>
<p class="font-body-lg text-body-lg font-medium text-on-surface">0987 654 321</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">Người nhận 1</p>
</div>
</div>
<button aria-label="Xóa số điện thoại 0987 654 321" class="p-2 rounded-full text-on-surface-variant hover:bg-error-container hover:text-error transition-colors active:scale-95 focus:outline-none focus:ring-2 focus:ring-error">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">delete</span>
</button>
</div>
<!-- Item 2 -->
<div class="flex items-center justify-between p-4 bg-surface rounded-xl border border-outline-variant shadow-sm group hover:shadow-md transition-shadow">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">phone_iphone</span>
</div>
<div>
<p class="font-body-lg text-body-lg font-medium text-on-surface">Còn 2 chỗ trống</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">Còn 2 chỗ trống</p>
</div>
</div>
<button aria-label="Xóa số điện thoại 0123 456 789" class="p-2 rounded-full text-on-surface-variant hover:bg-error-container hover:text-error transition-colors active:scale-95 focus:outline-none focus:ring-2 focus:ring-error">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">delete</span>
</button>
</div>
<!-- Empty Slot Indicator -->
<div class="flex items-center justify-center p-4 rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-lowest opacity-60">
<p class="font-body-md text-body-md text-on-surface-variant italic">Còn 1 chỗ trống</p>
</div>
</section>
<!-- Spacer to push button to bottom if content is short -->
<div class="flex-grow"></div>
<!-- Add Button (Sticky to bottom on mobile, inline on desktop) -->
<div class="sticky bottom-4 md:static md:bottom-auto w-full pt-4 pb-2 bg-background md:bg-transparent md:pt-0">
<button class="w-full flex items-center justify-center gap-2 bg-primary text-on-primary font-label-lg text-label-lg py-3 px-6 rounded-full hover:bg-surface-tint transition-colors shadow-md hover:shadow-lg active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary h-12">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">add</span>
                Thêm SĐT
            </button>
</div>
</main>
<div class="fixed inset-0 z-[100] flex items-center justify-center p-container-padding" id="add-phone-modal">
<!-- Backdrop -->
<div class="absolute inset-0 bg-on-background/40 backdrop-blur-sm"></div>
<!-- Dialog Content -->
<div class="relative w-full max-w-md bg-surface-container-lowest rounded-xl shadow-lg flex flex-col overflow-hidden">
<div class="p-6 flex flex-col gap-6">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Thêm số điện thoại mới</h2>
<div class="flex flex-col gap-4">
<!-- Phone Input -->
<div class="flex flex-col gap-1.5">
<label class="font-label-lg text-label-lg text-on-surface-variant">Số điện thoại</label>
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-body-lg" placeholder="Nhập số điện thoại..." type="tel">
</div>
<!-- Name Input -->
<div class="flex flex-col gap-1.5">
<label class="font-label-lg text-label-lg text-on-surface-variant">Tên người nhận</label>
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-body-lg" placeholder="Nhập tên người nhận..." type="text">
</div>
</div>
<!-- Actions -->
<div class="flex items-center justify-end gap-3 pt-2">
<button class="px-6 py-2.5 rounded-full font-label-lg text-label-lg text-primary hover:bg-surface-container-high transition-colors active:scale-95">Hủy</button>
<button class="px-6 py-2.5 rounded-full font-label-lg text-label-lg bg-primary text-on-primary hover:bg-surface-tint shadow-sm hover:shadow-md transition-all active:scale-95">Thêm mới</button>
</div>
</div>
</div>
</div>

</body></html>
